# Burst traffic pattern for the amplified comparison run.
#
# Phase 1: warm-up baseline (very low rate for 10 s) so the consumer settles
#          into its initial replica count before the burst arrives.
# Phase 2: BURST! 15 s at 1000 msg/s. The longer burst makes the slower early
#          reaction of the CPU-based baseline show up as a deeper queue.
# Phase 3: silence. The producer stops for 60 s; the longer tail observation
#          should be handled by OBS_DURATION rather than this pattern itself.
name: burst
description: 15-second burst at 1000 msg/s, then 60 seconds of silence
phases:
  - duration_sec: 10
    rate_per_sec: 5
    payload_bytes: 256
  - duration_sec: 15
    rate_per_sec: 1000
    payload_bytes: 256
  - duration_sec: 60
    rate_per_sec: 0
    payload_bytes: 256
